<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';">
    <link rel="stylesheet" href="styles/hud.css">
  </head>
  <body>
    <main class="hud">
      <section>
        <div class="kicker" id="kind">Deepmate</div>
        <h1 id="title">Current work</h1>
        <p id="summary">Deepmate is ready.</p>
        <dl class="facts" aria-label="Current work facts">
          <div>
            <dt>Project</dt>
            <dd id="project">-</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="status">idle</dd>
          </div>
        </dl>
        <ol id="timeline" class="timeline" aria-label="Recent progress"></ol>
      </section>
      <div id="feedback" class="feedback" hidden>
        <button id="feedback-useful" type="button">Useful</button>
        <button id="feedback-less" type="button">Less often</button>
      </div>
      <div class="actions">
        <button id="open-current" type="button">Open current work</button>
        <button id="mute" type="button">Quiet mode</button>
        <button id="mini" type="button">Mini mode</button>
        <button id="hide-bubble" type="button">Hide bubble</button>
        <button id="quit" class="secondary" type="button">Quit</button>
      </div>
    </main>
    <script src="hud.js"></script>
  </body>
</html>
