name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,documents]"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(open("pyproject.toml", "rb").read().decode())["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Tag {tag!r} does not match pyproject version {version!r}; expected {expected!r}.")
              sys.exit(1)
          PY

      - name: Run release checks
        timeout-minutes: 10
        run: |
          export PYTHONUTF8=1
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          export PYTHONPATH=src

          python -m deepmate --help >/tmp/deepmate-help.txt
          python -m deepmate --doctor
          python -m unittest discover -s tests -p 'test_process_env.py' -v
          python -m unittest discover -s tests -p 'test_chat_completions_provider.py' -v
          python -m unittest discover -s tests -p 'test_builtin_tools.py' -v
          python -m unittest discover -s tests -p 'test_preview_deploy.py' -v
          python -m unittest discover -s tests -p 'test_runtime_validation.py' -v

      - name: Build package
        timeout-minutes: 10
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distribution
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/deepmate
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
