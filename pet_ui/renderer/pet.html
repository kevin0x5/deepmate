<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:;">
    <link rel="stylesheet" href="styles/pet.css">
  </head>
  <body>
    <main id="pet" class="pet state-idle species-dog" aria-label="Deepmate pet">
      <div class="status-layer" aria-hidden="true">
        <div class="thought thought-a"></div>
        <div class="thought thought-b"></div>
        <div class="alert-mark">!</div>
        <div class="spark spark-a"></div>
        <div class="spark spark-b"></div>
        <div class="sleep">zz</div>
      </div>
      <canvas id="sprite" class="sprite" width="160" height="128" aria-hidden="true"></canvas>
      <div class="shadow" aria-hidden="true"></div>
    </main>
    <script src="pet.js"></script>
  </body>
</html>
